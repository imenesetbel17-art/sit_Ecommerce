<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil | Pétales d'Exception</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <i class="fas fa-seedling"></i> 
                <span>Pétales d'Exception</span>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html"><i class="fas fa-home"></i> Accueil</a></li>
                <li><a href="products.html"><i class="fas fa-store"></i> Nos fleurs</a></li>
                <li><a href="register.html"><i class="fas fa-user-plus"></i> Inscription</a></li>
                <li><a href="login.html"><i class="fas fa-sign-in-alt"></i> Connexion</a></li>
                <li id="profileNav" style="display:none;"><a href="profile.html" class="active"><i class="fas fa-user-circle"></i> Mon Profil</a></li>
            </ul>
            <div class="theme-switch-wrapper">
                <i class="fas fa-sun"></i>
                <label class="theme-switch">
                    <input type="checkbox" id="themeToggle">
                    <span class="slider round"></span>
                </label>
                <i class="fas fa-moon"></i>
            </div>
            <div class="burger" id="burgerMenu">
                <i class="fas fa-bars"></i>
            </div>
        </nav>
    </header>

    <main>
        <div class="profile-container">
            <div class="profile-header">
                <i class="fas fa-user-circle"></i>
                <h2>Mon espace personnel</h2>
            </div>
            
            <div class="profile-info">
                <h3><i class="fas fa-id-card"></i> Informations du compte</h3>
                <p><strong>Nom :</strong> <span id="userName"></span></p>
                <p><strong>Email :</strong> <span id="userEmail"></span></p>
            </div>

            <div class="cart-section">
                <h3><i class="fas fa-shopping-basket"></i> Mon panier (Prix en DZD)</h3>
                <div id="cartItems" class="cart-items"></div>
                <div class="cart-total">
                    <strong>Total :</strong> <span id="cartTotal">0</span> DZD
                </div>
                <div class="cart-actions">
                    <button id="emptyCart" class="btn-secondary">Vider le panier</button>
                    <button id="checkoutBtn" class="btn-primary">Passer la commande</button>
                </div>
            </div>

            <div class="logout-section">
                <button id="logoutBtn" class="btn-danger"><i class="fas fa-sign-out-alt"></i> Se déconnecter</button>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <i class="fas fa-seedling"></i> Pétales d'Exception
                <p>Fleuriste d'art — Alger, Algérie</p>
            </div>
        </div>
        <p class="copyright">© 2026 — Éclats floraux & design précieux</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
