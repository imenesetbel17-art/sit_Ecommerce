<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | Pétales d'Exception</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <i class="fas fa-seedling"></i> 
                <span>Pétales d'Exception</span>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html"><i class="fas fa-home"></i> Accueil</a></li>
                <li><a href="products.html"><i class="fas fa-store"></i> Nos fleurs</a></li>
                <li><a href="register.html" class="active"><i class="fas fa-user-plus"></i> Inscription</a></li>
                <li><a href="login.html"><i class="fas fa-sign-in-alt"></i> Connexion</a></li>
                <li id="profileNav" style="display:none;"><a href="profile.html"><i class="fas fa-user-circle"></i> Mon Profil</a></li>
            </ul>
            <div class="theme-switch-wrapper">
                <i class="fas fa-sun"></i>
                <label class="theme-switch">
                    <input type="checkbox" id="themeToggle">
                    <span class="slider round"></span>
                </label>
                <i class="fas fa-moon"></i>
            </div>
            <div class="burger" id="burgerMenu">
                <i class="fas fa-bars"></i>
            </div>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h2><i class="fas fa-user-plus"></i> Créer un compte</h2>
            <p>Rejoignez l'exclusive communauté Pétales d'Exception</p>
            <form id="registerForm">
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" id="regName" placeholder="Votre nom et prénom" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="exemple@fleurs.com" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="regPwd" placeholder="Minimum 4 caractères" required>
                </div>
                <button type="submit" class="btn-primary">S'inscrire <i class="fas fa-arrow-right"></i></button>
            </form>
            <p class="message-text">Déjà inscrit ? <a href="login.html">Connectez-vous</a></p>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <i class="fas fa-seedling"></i> Pétales d'Exception
                <p>Fleuriste d'art — Alger, Algérie</p>
            </div>
        </div>
        <p class="copyright">© 2026 — Éclats floraux & design précieux</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
